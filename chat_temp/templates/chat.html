<!DOCTYPE html>
<html>
<head>
<title>Temporary Chat</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('chat.static', filename='chat.css') }}">
</head>
<body class="bg-light">
<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-6">
<h3 class="text-center mb-4">Temporary Chat</h3>
<div id="login" class="card shadow-sm">
<div class="card-body">
<div class="mb-3"><input id="session" class="form-control" placeholder="Session ID"></div>
<div class="mb-3"><input id="user" class="form-control" placeholder="Codename"></div>
<div class="mb-3"><input type="password" id="password" class="form-control" placeholder="Password"></div>
<div class="d-grid"><button class="btn btn-primary" onclick="join()">Join Chat</button></div>
</div>
</div>
<div id="chat" class="card shadow-sm d-none">
<div class="card-body">
<div id="chatbox" class="border rounded p-3 mb-3 bg-white"></div>
<div class="input-group">
<input id="msg" class="form-control" placeholder="Type a message">
<button class="btn btn-primary" onclick="send()">Send</button>
</div>
</div>
</div>
</div>
</div>
</div>
<script src="{{ url_for('chat.static', filename='chat.js') }}"></script>
</body>
</html>
